function gv(sid,w){return(D[w]&&D[w][sid])?D[w][sid].v:0}
function gc(sid,w){return(D[w]&&D[w][sid])?D[w][sid].c:0}
function gcat(sid,w,cat){return(D[w]&&D[w][sid]&&D[w][sid].cats[cat])?D[w][sid].cats[cat]:0}
function gp(sid,w){return(D[w]&&D[w][sid])?D[w][sid].plats:[]}
function pct(a,b){if(a===0)return b>0?999:0;return Math.round((b-a)/a*100)}
function chg(p){if(p>30)return{c:'up',t:'↑'+p+'%'};if(p>5)return{c:'up',t:'↗'+p+'%'};if(p>-5)return{c:'flat',t:'→'};if(p>-30)return{c:'down',t:'↘'+Math.abs(p)+'%'};return{c:'down',t:'↓'+Math.abs(p)+'%'}}

    const maxV=Math.max(...vals,1);
    const miniSpark=vals.map((v,idx)=>{const h=Math.max(3,v/maxV*20);const c=idx===4?s.color:'rgba(148,163,184,0.3)';return`<div class="spark-bar" style="height:${h}px;background:${c}" title="W${idx<2?idx+1:idx+1}: ${v}"></div>`}).join('');

    html+=`<div class="streamer-card">
      <div class="streamer-head" onclick="toggleCard(${i})">
        <div>
          <div class="streamer-name">${s.name} <span style="font-size:12px;color:#64748b;font-weight:400">(${d.sid})</span></div>
          <div class="streamer-meta"><span>${d.msgs}条消息</span><span>${d.convs}个对话</span><span>02.23 - 03.03</span><span style="margin-left:4px"><div class="spark" style="display:inline-flex;vertical-align:middle">${miniSpark}</div></span></div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="streamer-badges">${riskBadge}${platBadges}</div>
          <div class="expand-icon" id="icon-${i}">▼</div>
        </div>
      </div>
      <div class="streamer-body" id="body-${i}">
        <div style="padding:8px 0 12px;font-size:13px;color:#94a3b8;border-bottom:1px solid rgba(148,163,184,0.06);margin-bottom:12px">${d.summary}</div>
        ${riskHtml}
        <div class="section-title">消息分类</div><div class="cat-bars">${catBars}</div>
        ${msgHtml}
      </div>
    </div>`;
  });
  document.getElementById('panel-weekly').innerHTML=html;
}

function toggleCard(i){
  document.getElementById('body-'+i).classList.toggle('open');
  document.getElementById('icon-'+i).classList.toggle('open');
}

// ═══ Tab switching ═══
document.getElementById('tabBar').addEventListener('click',e=>{
  const tab=e.target.closest('.tab');
  if(!tab)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
});

renderSummary();renderTrend();renderDetail();renderPlatform();renderAlerts();renderWeekly();
</script>
</body>
</html>
